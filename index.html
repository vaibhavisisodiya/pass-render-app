<!DOCTYPE html>
<html>
<head>
  <title>PaaS Web App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Student Web Application</h1>
    <p>This web application is deployed on Render PaaS.</p>
    <button onclick="getMessage()">Check Deployment</button>
    <h3 id="output"></h3>
  </div>

  <script>
    function getMessage() {
      fetch("/api/message")
        .then(response => response.json())
        .then(data => {
          document.getElementById("output").innerText = data.message;
        });
    }
  </script>
</body>
</html>
